version: "3.8"

services:
  # ==========================
  # API Gateway
  # ==========================
  nginx:
    image: nginx:alpine
    container_name: pos_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - tenant-service
      - product-service
      - pos-service
      - report-service
    networks:
      - pos_network

  # ==========================
  # Cache & Session
  # ==========================
  redis:
    image: redis:7-alpine
    container_name: pos_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pos_network

  # ==========================
  # Auth Service
  # ==========================
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: pos_auth_service
    ports:
      - "3001:3001"
    env_file:
      - .env.auth-service
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pos_network

  # ==========================
  # Tenant Service
  # ==========================
  tenant-service:
    build:
      context: .
      dockerfile: services/tenant-service/Dockerfile
    container_name: pos_tenant_service
    ports:
      - "3002:3002"
    env_file:
      - .env.tenant-service
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pos_network

  # ==========================
  # Product Service
  # ==========================
  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: pos_product_service
    ports:
      - "3003:3003"
    env_file:
      - .env.product-service
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pos_network

  # ==========================
  # POS Service
  # ==========================
  pos-service:
    build:
      context: .
      dockerfile: services/pos-service/Dockerfile
    container_name: pos_pos_service
    ports:
      - "3004:3004"
    env_file:
      - .env.pos-service
    depends_on:
      redis:
        condition: service_healthy
      product-service:
        condition: service_started
    networks:
      - pos_network

  # ==========================
  # Report Service
  # ==========================
  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
    container_name: pos_report_service
    ports:
      - "3005:3005"
    env_file:
      - .env.report-service
    depends_on:
      redis:
        condition: service_healthy
      pos-service:
        condition: service_started
    networks:
      - pos_network

networks:
  pos_network:
    driver: bridge

volumes:
  redis_data:
