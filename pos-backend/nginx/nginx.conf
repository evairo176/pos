worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  upstream auth_service {
    server auth-service:3001;
  }

  upstream tenant_service {
    server tenant-service:3002;
  }

  upstream product_service {
    server product-service:3003;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Health check
    location = /health {
      return 200 '{"status":"ok","gateway":"nginx"}';
      add_header Content-Type application/json;
    }

    # Auth Service
    location /api/auth/ {
      proxy_pass http://auth_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tenant Service (tenants + outlets)
    location ~ ^/api/(tenants|outlets)(/.*)?$ {
      proxy_pass http://tenant_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Product Service (products, categories, stock)
    location ~ ^/api/(products|categories|stock)(/.*)?$ {
      proxy_pass http://product_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
